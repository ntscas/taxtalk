name: Node.js CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # npm 캐시를 활성화해 매번 패키지를 다운로드하는 속도를 단축합니다.

    - name: Install dependencies
      run: npm ci

    - name: Run linter
      run: npm run lint # tsc --noEmit을 통해 TypeScript 타입 오류 유무를 체크합니다.

    - name: Build application
      run: npm run build # Vite 및 esbuild를 사용한 빌드가 일점 오류 없이 성공하는지 검증합니다.
